apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: website
spec:
  replicas: 1
  strategy:
    type: Recreate # Prevents multi-attach conflicts on local storage during rollouts
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16
          env:
            - name: POSTGRES_DB
              value: strapi
            - name: POSTGRES_USER
              value: strapi
            - name: POSTGRES_PASSWORD
              value: strongpassword
          ports:
            - containerPort: 5432
          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: website
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path # Uses K3s built-in local provisioner
  resources:
    requests:
      storage: 5Gi