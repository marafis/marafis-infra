apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: website
spec:
  serviceName: postgres
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:16

          ports:
            - containerPort: 5432

          env:
            - name: POSTGRES_DB
              value: strapi
            - name: POSTGRES_USER
              value: strapi
            - name: POSTGRES_PASSWORD
              value: strapi
            # safer data directory handling
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata

          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "strapi"]
            initialDelaySeconds: 20
            periodSeconds: 10

          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "strapi"]
            initialDelaySeconds: 30
            periodSeconds: 20

          resources:
            limits:
              memory: "512Mi"
              cpu: "500m"

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data

  volumeClaimTemplates:
    - metadata:
        name: postgres-storage
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path   # later upgrade to longhorn
        resources:
          requests:
            storage: 10Gi