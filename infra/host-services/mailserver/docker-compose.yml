version: '3.8'

services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: marafis.com
    ports:
      - "25:25"     # SMTP (Server-to-Server delivery)
      - "143:143"   # IMAP STARTTLS
      - "465:465"   # SMTPS (Implicit SSL/TLS)
      - "587:587"   # SMTP Submission (STARTTLS)
      - "993:993"   # IMAPS (Implicit SSL/TLS)
    volumes:
      - ./mail-data:/var/mail
      - ./mail-state:/var/mail-state
      - ./mail-logs:/var/log/mail
      - ./config:/tmp/docker-mailserver
      # Mount directory containing mapped cert-manager certificates from the host
      - /etc/letsencrypt/live/marafis.com:/tmp/dms/certs:ro
    environment:
      - OVERVIEW_ENABLED=0

      # TLS Configuration using your cert-manager certificates
      - SSL_TYPE=manual
      - SSL_CERT_DIR=/tmp/dms/certs

      # Resource Optimization: Disable high-memory scanning services (~300MB RAM footprint total)
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - ENABLE_FAIL2BAN=1
      - ENABLE_POSTGREY=0

      - ONE_DIR=1
      - LOG_LEVEL=info
      - PERMIT_DOCKER=network
      - UPDATE_CHECK_INTERVAL=1d
      - DOVECOT_AUTH_MECHANISMS=plain login
      - PERMIT_DOCKER=network-interface
      - OUR_NETWORKS=10.42.0.0/16,10.43.0.0/16,10.0.0.0/24
    restart: always