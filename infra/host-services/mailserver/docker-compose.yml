services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: marafis.com
    ports:
      - "25:25"       # SMTP
      - "143:143"     # IMAP Non-SSL
      - "587:587"     # SMTP Submission
    volumes:
      - /opt/mail-stack/mail-data:/var/mail
      - /opt/mail-stack/mail-state:/var/mail-state
      - /opt/mail-stack/mail-logs:/var/log/mail
      - /opt/mail-stack/config:/tmp/docker-mailserver
    environment:
      - TLS_LEVEL=none
      - ONE_DIR=1
      - ENABLE_FAIL2BAN=1
      - PERMIT_DOCKER=network
    networks:
      - mail-net
    restart: always

  roundcube:
    image: roundcube/roundcubemail:latest
    container_name: roundcube
    ports:
      - "8080:80"
    environment:
      - ROUNDCUBEMAIL_URL=https://webmail.marafis.com
      - ROUNDCUBEMAIL_DEFAULT_HOST=mailserver
      - ROUNDCUBEMAIL_SMTP_SERVER=mailserver
      - ROUNDCUBEMAIL_SMTP_PORT=587
      - ROUNDCUBEMAIL_SMTP_USER=%u
      - ROUNDCUBEMAIL_SMTP_PASSWORD=%p
    depends_on:
      - mailserver
    networks:
      - mail-net
    restart: always

networks:
  mail-net:
    driver: bridge