services:
  mailserver:
    image: ghcr.io/docker-mailserver/docker-mailserver:latest
    container_name: mailserver
    hostname: mail
    domainname: marafis.com
    ports:
      - "25:25"      # SMTP
      - "465:465"    # SMTPS
      - "587:587"    # SMTP Submission (STARTTLS)
      - "143:143"    # IMAP (optional)
      - "993:993"    # IMAPS
    volumes:
      - /opt/mail-stack/mail-data:/var/mail
      - /opt/mail-stack/mail-state:/var/mail-state
      - /opt/mail-stack/mail-logs:/var/log/mail
      - /opt/mail-stack/config:/tmp/docker-mailserver
      - /etc/letsencrypt:/etc/letsencrypt:ro

    environment:
      - TLS_LEVEL=modern
      - SSL_TYPE=letsencrypt
      - ONE_DIR=1
      - ENABLE_FAIL2BAN=1
      - PERMIT_DOCKER=network
      # 🔐 CRITICAL SECURITY SETTINGS
      - ENABLE_IMAP=1
      - ENABLE_IMAPS=1
      - ENABLE_POP3=0
      - ENABLE_SPAMASSASSIN=0
      - ENABLE_CLAMAV=0
      - POSTFIX_INET_PROTOCOLS=ipv4
    networks:
      - mail-net
    restart: always

networks:
  mail-net:
    name: mail-stack_mail-net
    driver: bridge