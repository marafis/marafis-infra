apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls-mailserver
  namespace: cert-manager
spec:
  secretName: wildcard-tls-mailserver

  issuerRef:
    name: letsencrypt-wildcard
    kind: ClusterIssuer

  commonName: "*.marafis.com"
  dnsNames:
    - "marafis.com"
    - "*.marafis.com"

  renewBefore: 720h