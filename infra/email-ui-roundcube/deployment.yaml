# infra/email-ui-roundcube/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      hostAliases:
        - ip: "94.130.107.251"
          hostnames:
            - "mail.marafis.com"
      initContainers:
        - name: write-ssl-config
          image: busybox
          command:
            - sh
            - -c
            - |
              cat > /ssl-config/ssl-options.php << 'PHPEOF'
              <?php
              $config['imap_conn_options'] = ['ssl' => ['verify_peer' => false, 'verify_peer_name' => false, 'allow_self_signed' => true]];
              $config['smtp_conn_options'] = ['ssl' => ['verify_peer' => false, 'verify_peer_name' => false, 'allow_self_signed' => true]];
              PHPEOF
          volumeMounts:
            - name: ssl-config
              mountPath: /ssl-config
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          ports:
            - containerPort: 80
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://10.0.0.2"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://10.0.0.2"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
          volumeMounts:
            - name: ssl-config
              mountPath: /var/www/html/config/ssl-options.php
              subPath: ssl-options.php
      volumes:
        - name: ssl-config
          emptyDir: {}