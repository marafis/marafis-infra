# infra/email-ui-roundcube/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: website
  labels:
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/part-of: marafis-email
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      hostAliases:
        - ip: "94.130.107.251"
          hostnames:
            - "mail.marafis.com"
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              name: http
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "94.130.107.251"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "94.130.107.251"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
          volumeMounts:
            - name: config-volume
              mountPath: /var/www/html/config/config.user.inc.php
              subPath: config.user.inc.php
      volumes:
        - name: config-volume
          configMap:
            name: roundcube-config