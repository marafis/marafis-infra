# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube-bridge-placeholder
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube-bridge-placeholder
  template:
    metadata:
      labels:
        app: roundcube-bridge-placeholder
    spec:
      hostNetwork: true
      containers:
        - name: socat
          image: alpine/socat
          # This forwards internal port 8080 to your external IP
          #command: [ "socat", "TCP-LISTEN:8080,fork", "TCP:127.0.0.1:8080" ]
          command: [ "/bin/sh", "-c", "apk add --no-cache netcat-openbsd && nc -zv 127.0.0.1 8080" ]
          ports:
            - containerPort: 8080