# infra/email-ui-roundcube/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      hostAliases:
        - ip: "94.130.107.251"
          hostnames:
            - "mail.marafis.com"
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          ports:
            - containerPort: 80
          # We can completely remove the duplicate env vars since they are explicitly defined above
          volumeMounts:
            - name: config-volume
              mountPath: /var/www/html/config/config.docker.inc.php
              subPath: config.docker.inc.php
      volumes:
        - name: config-volume
          configMap:
            name: roundcube-config