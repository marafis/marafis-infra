# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube-bridge-placeholder
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube-bridge-placeholder
  template:
    metadata:
      labels:
        app: roundcube-bridge-placeholder
    spec:
      containers:
        - name: socat
          image: alpine/socat
          # This forwards internal port 8080 to your external IP
          command: [ "socat", "TCP-LISTEN:8080,fork", "TCP:172.18.0.3:8080" ]
          ports:
            - containerPort: 8080