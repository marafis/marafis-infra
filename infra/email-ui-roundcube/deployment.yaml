# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube-bridge-placeholder
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube-bridge-placeholder
  template:
    metadata:
      labels:
        app: roundcube-bridge-placeholder
    spec:
      containers:
        - name: socat
          image: alpine/socat
          # This forwards internal port 8080 to your external IP
          command: [ "socat", "TCP-LISTEN:8001,fork", "TCP:94.130.107.251:8001" ]
          ports:
            - containerPort: 8001