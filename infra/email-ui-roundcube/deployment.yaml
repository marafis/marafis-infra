apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: website
  labels:
    app.kubernetes.io/name: roundcube
    app.kubernetes.io/version: latest
    app.kubernetes.io/part-of: marafis-email
spec:
  replicas: 1
  
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: roundcube
  
  template:
    metadata:
      labels:
        app: roundcube
        version: v1
      annotations:
        # Restart pod if config changes
        checksum/config: "v1"
    
    spec:
      hostAliases:
        - ip: "172.17.0.1"
          hostnames:
            - "mail.marafis.com"
      # ==========================================
      # Init Container: Prepare CA Certificates
      # ==========================================
      # This ensures CA certificates are available and up-to-date
      # when the main container starts
      initContainers:
        - name: setup-ca-certs
          image: debian:bookworm-slim
          imagePullPolicy: IfNotPresent
          
          command:
            - /bin/bash
            - -c
            - |
              set -e
              
              echo "[$(date)] Setting up CA certificates for SSL validation..."
              
              # Update CA certificate bundle
              update-ca-certificates 2>&1 || true
              
              # Verify Let's Encrypt CA is available (required for mail.marafis.com)
              if [ -f /etc/ssl/certs/ca-certificates.crt ]; then
                echo "[$(date)] ✓ System CA bundle available"
                CERT_COUNT=$(grep -c "BEGIN CERTIFICATE" /etc/ssl/certs/ca-certificates.crt || echo "0")
                echo "[$(date)] Found $CERT_COUNT certificates in system CA bundle"
              else
                echo "[$(date)] WARNING: System CA bundle not found"
              fi
              
              # If custom CA bundle is mounted, register it
              if [ -f /usr/local/share/ca-certificates/mailserver-ca.crt ]; then
                echo "[$(date)] Custom mail server CA certificate found, updating bundle..."
                update-ca-certificates --fresh
              fi
              
              echo "[$(date)] CA certificate setup complete"
          
          volumeMounts:
            - name: ca-certs
              mountPath: /usr/local/share/ca-certificates/
              readOnly: false

            - name: ssl-certs
              mountPath: /etc/ssl/certs/
              readOnly: false
      
      # ==========================================
      # DNS Policy & Hostname Resolution
      # ==========================================
      # Use cluster DNS for service discovery
      dnsPolicy: ClusterFirst
      dnsConfig:
        # Additional search domains for mail server resolution
        searches:
          - website.svc.cluster.local
          - svc.cluster.local
          - cluster.local
        
        # Optional: Add custom DNS server if mail server is outside cluster
        # nameservers:
        #   - 8.8.8.8
      
      # ==========================================
      # Main Container: Roundcube Web UI
      # ==========================================
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          imagePullPolicy: IfNotPresent
          
          # ==========================================
          # Startup Configuration
          # ==========================================
          startupProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12
          
          # ==========================================
          # Liveness Check
          # ==========================================
          # Ensure container restarts if web server hangs
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # ==========================================
          # Readiness Check
          # ==========================================
          # Only route traffic when ready
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          # ==========================================
          # Port Configuration
          # ==========================================
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          
          # ==========================================
          # Environment Variables
          # ==========================================
          # Using hostname (mail.marafis.com) instead of hardcoded IP
          # This enables DNS resolution and better resilience
          env:
            # IMAP Configuration
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://mail.marafis.com"

            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            
            # SMTP Configuration
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://mail.marafis.com"

            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            
            # Security Settings
            - name: ROUNDCUBEMAIL_INSECURE
              value: "0"  # Enforce SSL/TLS
            
            # Logging
            - name: ROUNDCUBEMAIL_SMTP_DEBUG
              value: "1"
            
            # Database (optional - for production use persistent storage)
            - name: ROUNDCUBEMAIL_DB_TYPE
              value: "sqlite"

            - name: ROUNDCUBEMAIL_SKIN
              value: "elastic"
          
          # ==========================================
          # Volume Mounts
          # ==========================================
          volumeMounts:
            # Configuration (read-only)
            - name: config-volume
              mountPath: /var/roundcube/config
              readOnly: true
            
            # CA Certificates (from init container setup)
            - name: ca-certs
              mountPath: /etc/ssl/certs/
              readOnly: true
            
            # Custom CA bundle (if available)
            - name: custom-ca-certs
              mountPath: /usr/local/share/ca-certificates/
              readOnly: true
            
            # Temporary storage
            - name: tmp
              mountPath: /tmp
            
            # Roundcube logs
            - name: logs
              mountPath: /var/roundcube/logs
          
          # ==========================================
          # Resource Limits
          # ==========================================
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          
          # ==========================================
          # Security Context
          # ==========================================
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: true
            runAsUser: 33  # www-data user
            capabilities:
              drop:
                - ALL
              add:
                - NET_BIND_SERVICE
      
      # ==========================================
      # Volumes
      # ==========================================
      volumes:
        # ConfigMap: Roundcube configuration
        - name: config-volume
          configMap:
            name: roundcube-config
            defaultMode: 0644
        
        # CA Certificates (system and custom)
        - name: ca-certs
          emptyDir: {}
        
        # Custom CA bundle (optional - create from secret if needed)
        - name: custom-ca-certs
          emptyDir: {}
        
        # SSL directory for system certs
        - name: ssl-certs
          emptyDir: {}
        
        # Temporary storage
        - name: tmp
          emptyDir:
            sizeLimit: 1Gi
        
        # Logs
        - name: logs
          emptyDir:
            sizeLimit: 500Mi
      
      # ==========================================
      # Pod-level Configuration
      # ==========================================
      restartPolicy: Always
      
      # Use node affinity if needed
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: workload-type
      #               operator: In
      #               values:
      #                 - web
      
      # Tolerate node taints if needed
      # tolerations:
      #   - key: "workload-type"
      #     operator: "Equal"
      #     value: "web"
      #     effect: "NoSchedule"