apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      hostAliases:
        - ip: "94.130.107.251" # Force it to resolve externally to the host interface cleanly
          hostnames:
            - "mail.marafis.com"
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          ports:
            - containerPort: 80
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://10.0.0.2"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
            - name: ROUNDCUBEMAIL_SMTP_SERVER
              value: "tls://10.0.0.2"
            - name: ROUNDCUBEMAIL_SMTP_PORT
              value: "587"
            - name: ROUNDCUBEMAIL_IMAP_CONN_OPTIONS
              value: '{"ssl":{"verify_peer":false,"verify_peer_name":false}}'
            - name: ROUNDCUBEMAIL_SMTP_CONN_OPTIONS
              value: '{"ssl":{"verify_peer":false,"verify_peer_name":false}}'
          volumeMounts:
            - name: roundcube-config
              mountPath: /var/www/html/config/config.inc.php
              subPath: roundcube.php
      volumes:
        - name: roundcube-config
          configMap:
            name: roundcube-config