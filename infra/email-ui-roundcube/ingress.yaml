apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube-ingress
  namespace: website
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  tls:
    - hosts:
        - webmail.marafis.com
      secretName: webmail-marafis-tls
  rules:
    - host: webmail.marafis.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundcube-docker-bridge
                port:
                  number: 8080