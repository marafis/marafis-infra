apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube-ingress
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod" # ◄── Uses your cluster's Cert-Manager
    traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
spec:
  tls:
    - hosts:
        - webmail.marafis.com
      secretName: webmail-marafis-tls
  rules:
    - host: webmail.marafis.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundcube-docker-bridge
                port:
                  number: 8080