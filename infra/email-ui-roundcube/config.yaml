# infra/email-ui-roundcube/config.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: roundcube-config
  namespace: website
data:
  config.user.inc.php: |
    <?php
    // Native PHP syntax for pulling environment variables safely
    if (getenv('ROUNDCUBEMAIL_DB_DSNW')) {
        $config['db_dsnw'] = getenv('ROUNDCUBEMAIL_DB_DSNW');
    }

    // Forcefully override connection options globally
    $config['imap_conn_options'] = [
        'ssl' => [
            'verify_peer'       => false,
            'verify_peer_name'  => false,
            'allow_self_signed' => true,
        ],
    ];
    $config['smtp_conn_options'] = [
        'ssl' => [
            'verify_peer'       => false,
            'verify_peer_name'  => false,
            'allow_self_signed' => true,
        ],
    ];