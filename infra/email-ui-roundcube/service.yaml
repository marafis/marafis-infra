apiVersion: v1
kind: Service
metadata:
  name: roundcube-docker-bridge
  namespace: website # ◄── Aligned to your ArgoCD Destination Namespace
spec:
  clusterIP: None # ◄── Tells Kubernetes it's a Headless Service
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8080       # Port used inside the cluster by the Ingress
      targetPort: 8080 # Port exposed on your host machine via Docker
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube-external-dns
  namespace: website
spec:
  type: ExternalName
  externalName: 10.0.0.2 # ◄── Uses k3s default internal loopback DNS name