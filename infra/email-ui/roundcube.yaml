apiVersion: apps/v1
kind: Deployment
metadata:
  name: roundcube
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: roundcube
  template:
    metadata:
      labels:
        app: roundcube
    spec:
      containers:
        - name: roundcube
          image: roundcube/roundcubemail:latest
          ports:
            - containerPort: 80
          env:
            - name: ROUNDCUBEMAIL_DEFAULT_HOST
              value: "ssl://mail.marafis.com"
            - name: ROUNDCUBEMAIL_DEFAULT_PORT
              value: "993"
---
apiVersion: v1
kind: Service
metadata:
  name: roundcube-service
  namespace: default
spec:
  ports:
    - port: 80
      targetPort: 80
  selector:
    app: roundcube
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube-ingress
  namespace: default
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mail.marafis.com
      secretName: wildcard-marafis-tls
  rules:
    - host: mail.marafis.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundcube-service
                port:
                  number: 80