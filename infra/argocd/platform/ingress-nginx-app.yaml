apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1
    helm:
      values: |
        controller:
          service:
            type: LoadBalancer

          # This is the key config that makes HTTPS automatic for ALL apps.
          # ingress-nginx uses this wildcard cert for any ingress rule
          # that doesn't have its own tls: block. Apps never manage certs.
          extraArgs:
            default-ssl-certificate: "ingress-nginx/wildcard-tls"

          config:
            ssl-redirect: "true"
            force-ssl-redirect: "true"
            # Improve security headers for all apps automatically
            use-forwarded-headers: "true"
            proxy-real-ip-cidr: "0.0.0.0/0"
            hsts: "true"
            hsts-include-subdomains: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
