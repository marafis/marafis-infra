apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: wildcard-cert
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default

  source:
    repoURL: https://github.com/marafis/marafis-infra.git
    targetRevision: main
    path: infra/manifests/platform/wildcard-cert

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx          # Secret is created here so ingress-nginx can read it directly

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
