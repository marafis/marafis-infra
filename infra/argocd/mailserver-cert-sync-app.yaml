apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mailserver-cert-sync
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/marafis/marafis-infra
    targetRevision: main
    path: infra/mail-server-cert

  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager

  syncPolicy:
    automated:
      prune: true
      selfHeal: true