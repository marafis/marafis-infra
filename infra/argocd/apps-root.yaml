apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps-root
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/marafis/marafis-infra.git
    targetRevision: main
    path: infra/argocd/apps

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
