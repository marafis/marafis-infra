apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: metallb
  namespace: argocd
  annotations:
    # Set to wave 0 so network provisioning stabilizes before Strapi (2) and Frontend (4) run
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default

  source:
    repoURL: https://metallb.github.io/metallb
    chart: metallb
    targetRevision: 0.14.9
    # IF YOU NEED TO CUSTOMIZE HELM VALUES, DO IT HERE:
    helm:
      values: |
        speaker:
          frr:
            enabled: false # Set to true only if you run BGP routing, default L2 is fine false

  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system

  # =========================================================================
  # FIX: Tell ArgoCD to ignore the dynamic security values mutated by MetalLB
  # =========================================================================
  ignoreDifferences:
    # 1. Ignore the dynamic certificate injected into the validation webhook
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      name: metallb-webhook-configuration
      jsonPointers:
        - /webhooks/0/clientConfig/caBundle
        - /webhooks/1/clientConfig/caBundle

    # 2. Ignore the dynamic certs injected into MetalLB's Custom Resource Definitions
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /spec/conversion/webhook/clientConfig/caBundle

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # This forces ArgoCD to respect the ignore rules during the automated sync phase
      - RespectIgnoreDifferences=true