apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ip-pool
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default

  source:
    repoURL: https://github.com/marafis/marafis-infra.git
    targetRevision: main
    path: infra/metallb

  destination:
    server: https://kubernetes.default.svc
    namespace: metallb-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
