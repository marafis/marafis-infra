apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-tls
  namespace: ingress-nginx
  labels:
    app.kubernetes.io/name: wildcard-certificate
    app.kubernetes.io/instance: marafis
    app.kubernetes.io/part-of: tls-infrastructure
  annotations:
    description: "Wildcard certificate for *.marafis.com - used by ingress-nginx and mail server"

spec:
  secretName: wildcard-tls
  issuerRef:
    name: letsencrypt-wildcard
    kind: ClusterIssuer
  commonName: "*.marafis.com"
  dnsNames:
    - "marafis.com"              # Apex domain (required separately)
    - "*.marafis.com"
  renewBefore: 720h
  duration: 2160h
  privateKey:
    algorithm: RSA
    encoding: PKCS1
    size: 2048