apiVersion: batch/v1
kind: CronJob
metadata:
  name: mailserver-cert-sync
  namespace: ingress-nginx
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: mailserver-cert-sync
          containers:
            - name: sync
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  CERT_DIR=/host/opt/mailserver/certs
                  mkdir -p $CERT_DIR
                  
                  # ✅ FIXED: Using bracket notation preserves the dot in the key name cleanly
                  kubectl get secret wildcard-tls -n ingress-nginx \
                    -o jsonpath="{.data['tls\.crt']}" | base64 -d > $CERT_DIR/fullchain.pem

                  kubectl get secret wildcard-tls -n ingress-nginx \
                    -o jsonpath="{.data['tls\.key']}" | base64 -d > $CERT_DIR/privkey.pem
              volumeMounts:
                - name: host
                  mountPath: /host
          volumes:
            - name: host
              hostPath:
                path: /