apiVersion: batch/v1
kind: CronJob
metadata:
  name: mailserver-cert-sync
  namespace: ingress-nginx
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          serviceAccountName: mailserver-cert-sync
          containers:
            - name: sync
              image: bitnami/kubectl:latest
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  CERT_DIR=/host/opt/mailserver/certs
                  mkdir -p $CERT_DIR
                  
                  kubectl get secret wildcard-tls -n ingress-nginx \
                    -o go-template='{{index .data "tls.crt" | base64decode}}' > $CERT_DIR/fullchain.pem

                  kubectl get secret wildcard-tls -n ingress-nginx \
                    -o go-template='{{index .data "tls.key" | base64decode}}' > $CERT_DIR/privkey.pem

              volumeMounts:
                - name: host
                  mountPath: /host

          volumes:
            - name: host
              hostPath:
                path: /