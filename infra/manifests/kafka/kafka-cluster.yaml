apiVersion: kafka.strimzi.io/v1beta2
kind: Kafka
metadata:
  name: kafka-cluster
  namespace: kafka
spec:
  kafka:
    version: 4.1.2
    replicas: 3
    listeners:
      - name: plain
        port: 9092
        type: internal
        tls: false

    storage:
      type: persistent-claim
      size: 20Gi

  kraft:
    enabled: true

  entityOperator:
    topicOperator: {}
    userOperator: {}
