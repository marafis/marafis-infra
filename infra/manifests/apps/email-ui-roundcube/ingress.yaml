apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: roundcube-ingress
  namespace: website
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mail.marafis.com
      secretName: wildcard-marafis-tls
  rules:
    - host: mail.marafis.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: roundcube-service
                port:
                  number: 80