apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-wildcard
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: oncmmr@gmail.com
    privateKeySecretRef:
      name: letsencrypt-account-key

    solvers:
      - dns01:
          cloudDNS:
            project: marafis-com
            serviceAccountSecretRef:
              name: clouddns-sa-secret  # REPLACE: name of your existing K8s Secret
              key: key.json                # key inside the Secret (usually key.json)
