apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-wildcard
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: oncmmr@gmail.com                    # REPLACE: Let's Encrypt notifications go here

    # cert-manager stores the ACME account private key in this secret.
    # This is NOT your GCP SA key — it is auto-generated by cert-manager.
    privateKeySecretRef:
      name: letsencrypt-account-key

    solvers:
      - dns01:
          cloudDNS:
            project: marafis-com # REPLACE: GCP project that owns your Cloud DNS zone

            # Your GCP Service Account key — already created as a K8s Secret.
            # The secret MUST be in the cert-manager namespace.
            # Expected structure: kubectl create secret generic clouddns-sa-secret \
            #   --from-file=key.json=./sa-key.json -n cert-manager
            serviceAccountSecretRef:
              name: clouddns-sa-secret  # REPLACE: name of your existing K8s Secret
              key: key.json                # key inside the Secret (usually key.json)
