apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.15.1

    helm:
      values: |
        controller:
          service:
            type: LoadBalancer

          # IMPORTANT:
          # We DO NOT set default-ssl-certificate here
          # TLS is fully handled by cert-manager + Ingress

          config:
            ssl-redirect: "true"
            force-ssl-redirect: "true"

  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false

    syncOptions:
      - CreateNamespace=true